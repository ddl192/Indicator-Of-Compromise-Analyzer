name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Tests on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show versions
        run: |
          python --version
          pip list

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Smoke-test CLI (log analysis only — no network)
        shell: bash
        run: |
          cd src
          cp ../tests/apache.log .
          cp ../tests/ioc_list.json ./ioc_list.json
          python analyzer.py --log apache.log --ioc ioc_list.json --output /tmp/alerts.csv -q
          test -f /tmp/alerts.csv
          # The first line must be the original CSV header (compat check).
          head -n1 /tmp/alerts.csv | grep -q '^file,ioc_type,pattern,line'
