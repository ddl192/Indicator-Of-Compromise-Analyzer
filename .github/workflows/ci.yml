name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Tests on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show versions
        run: |
          python --version
          pip list

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Smoke-test CLI (log analysis only — no network)
        shell: python
        run: |
          import os, shutil, subprocess, sys, tempfile

          os.chdir("src")
          shutil.copy("../tests/apache.log", "apache.log")
          shutil.copy("../tests/ioc_list.json", "ioc_list.json")

          out = os.path.join(tempfile.gettempdir(), "alerts.csv")

          rc = subprocess.run(
              [sys.executable, "analyzer.py",
               "--log", "apache.log",
               "--ioc", "ioc_list.json",
               "--output", out, "-q"],
              check=False,
          ).returncode
          # 0 = found alerts, 2 = nothing found. Both fine for smoke-test.
          if rc not in (0, 2):
              sys.exit(f"analyzer exited with code {rc}")

          if not os.path.isfile(out):
              sys.exit(f"output file not created: {out}")

          with open(out, "r", encoding="utf-8", newline="") as f:
              first = f.readline().strip()
          expected = "file,ioc_type,pattern,line"
          if first != expected:
              sys.exit(f"unexpected CSV header: {first!r} (want {expected!r})")
          print(f"OK: smoke-test passed (header={first!r})")
